server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Hash'li Vite varlıkları içeriğe göre değişir; uzun süre önbelleklenebilir.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Tek sayfa uygulaması: bilinmeyen yolları index.html'e düşür.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
