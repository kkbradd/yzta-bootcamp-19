services:
  frontend:
    build:
      context: .
      args:
        # Backend ve asistan adresleri — derleme anında gömülür. Prod'da değiştir.
        VITE_API_URL: http://localhost:8000
        VITE_ASISTAN_URL: http://localhost:8100
    ports:
      # Tarayıcı origin'i http://localhost:3000 olur; backend CORS bu origin'e izin verir.
      - "3000:80"
    restart: unless-stopped
